name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Leaf packages import @makibm/cli-kit's built dist, so build before tests.
      - run: pnpm build

      # gites' git-sandbox tests need a git identity on CI.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@makibm.dev"
          git config --global user.name "makibm ci"

      - run: pnpm test

      # Opens/updates a "Version Packages" PR when changesets exist; when that PR
      # is merged (versions bumped), this same step publishes to npm instead.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
